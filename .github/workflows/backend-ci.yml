name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Compose, lint, tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create CI env file
        shell: bash
        run: |
          set -Eeuo pipefail
          cat > .env <<'ENV'
          APP_ENV=ci
          APP_NAME=driving-agent-api
          API_V1_PREFIX=/api/v1
          WS_V1_PREFIX=/ws/v1
          LOG_LEVEL=INFO
          SQL_ECHO=false
          DEMO_MODE=true
          CORS_ORIGINS=http://localhost:5173

          BACKEND_EXPOSED_PORT=8000

          MYSQL_HOST=mysql
          MYSQL_PORT=3306
          MYSQL_DATABASE=driving_agent
          MYSQL_USER=driving_user
          MYSQL_PASSWORD=ci-driving-password
          MYSQL_ROOT_PASSWORD=ci-root-password
          MYSQL_EXPOSED_PORT=3306

          DEFAULT_ADMIN_ACCOUNT_ID=00000000-0000-0000-0000-000000000001
          DEFAULT_ADMIN_EMAIL=admin@example.com

          MODEL_PATH=/app/artifacts/models/best_vit.pth
          MODEL_VERSION=vit-dms-1.0.0
          DRIVER_MONITORING_ADAPTER=MOCK
          MOCK_VIT_INFERENCE_LATENCY_MS=0
          POLICY_VERSION=risk-policy-1.0.0
          WS_RECOMMENDED_FRAME_FPS=5
          WS_LOCATION_INTERVAL_MS=1000
          WS_HEARTBEAT_INTERVAL_MS=10000
          WS_HEARTBEAT_TIMEOUT_MS=30000

          GEMINI_API_KEY=
          GEMINI_MODEL=
          EMAIL_PROVIDER=
          EMAIL_HOST=
          EMAIL_PORT=
          EMAIL_USERNAME=
          EMAIL_PASSWORD=
          EMAIL_FROM=

          REPORT_STORAGE_PATH=/app/storage/reports
          ENV

      - name: Validate Compose config
        run: docker compose config

      - name: Start Compose stack
        run: docker compose up --build -d

      - name: Wait for service health
        shell: bash
        run: |
          set -Eeuo pipefail

          wait_for_health() {
            local service="$1"
            local container_id=""
            local status=""

            for _ in {1..60}; do
              container_id="$(docker compose ps -q "${service}")"
              if [[ -n "${container_id}" ]]; then
                status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${container_id}")"
                if [[ "${status}" == "healthy" ]]; then
                  echo "${service} is healthy"
                  return 0
                fi
              fi
              sleep 5
            done

            echo "${service} did not become healthy. Last status: ${status:-missing}" >&2
            return 1
          }

          wait_for_health mysql
          wait_for_health backend
          docker compose ps

      - name: Check Alembic revisions
        shell: bash
        run: |
          set -Eeuo pipefail
          docker compose exec -T backend alembic heads
          docker compose exec -T backend alembic current

      - name: Ruff
        run: docker compose exec -T backend ruff check . --no-cache

      - name: Pytest
        run: docker compose exec -T backend pytest -ra

      - name: Compile app
        run: docker compose exec -T backend python -m compileall app

      - name: Standalone Docker image build
        run: docker build -t driving-agent-backend-ci:${{ github.sha }} -f Dockerfile .

      - name: Compose logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color mysql backend

      - name: Stop Compose stack
        if: always()
        run: docker compose down -v

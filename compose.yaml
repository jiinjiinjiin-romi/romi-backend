services:
  mysql:
    image: mysql:8.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-driving_agent}
      MYSQL_USER: ${MYSQL_USER:-driving_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me-driving}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root}
    ports:
      - "${MYSQL_EXPOSED_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping --protocol=tcp -h 127.0.0.1 -P 3306 -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      TMAP_APP_KEY: ${TMAP_APP_KEY:-}
      TMAP_REQUEST_TIMEOUT_SECONDS: ${TMAP_REQUEST_TIMEOUT_SECONDS:-10}
      TMAP_PROXY_CACHE_TTL_MS: ${TMAP_PROXY_CACHE_TTL_MS:-30000}
      DRIVER_MONITORING_ADAPTER: ${DRIVER_MONITORING_ADAPTER:-MOCK}
      MOCK_VIT_INFERENCE_LATENCY_MS: ${MOCK_VIT_INFERENCE_LATENCY_MS:-0}
      REPORT_STORAGE_PATH: /app/storage/reports
    ports:
      - "${BACKEND_EXPOSED_PORT:-8000}:8000"
    volumes:
      - .:/app
      - ./artifacts:/app/artifacts
      - ./storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql-data:
